services:
  postgres:
    image: postgres:16-alpine
    container_name: lab14_postgres
    environment:
      POSTGRES_DB: shop_analytics
      POSTGRES_USER: lab_user
      POSTGRES_PASSWORD: lab_password
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab_user -d shop_analytics"]
      interval: 5s
      timeout: 3s
      retries: 10

